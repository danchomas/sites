version: '3.8'

services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: admin_db
      POSTGRES_PASSWORD: super_password_123
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin_db:super_password_123@db:5432/finance_db
      - SECRET_KEY=your_very_secret_key_here_12345
      - ADMIN_EMAIL=admin@finance.ru
      - ADMIN_PASSWORD=admin123
    volumes:
      - uploads_data:/tmp/uploads/product_images

  frontend:
    image: nginx:alpine
    restart: always
    expose:
      - "80" # Важно! Expose вместо ports. Открывает порт только для других контейнеров, а не наружу
    environment:
      - VIRTUAL_HOST=${DOMAIN} # Сюда Makefile будет подставлять ваш домен
    depends_on:
      - backend
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - proxy-network # Подключаем фронтенд к сети прокси-сервера

volumes:
  postgres_data:
  uploads_data:

networks:
  proxy-network:
    external: true
    name: nginx-proxy